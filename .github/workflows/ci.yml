name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    # Dummy Clerk keys satisfy the shape check in next.config.ts'
    # validateClerkEnv. The build step does not exercise Clerk at
    # runtime; real keys live on Vercel, not in CI.
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci-dummy-key
      CLERK_SECRET_KEY: sk_test_ci-dummy-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
