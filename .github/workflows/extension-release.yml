name: Extension release

on:
  push:
    tags:
      - "extension-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify tag matches manifest version
        run: |
          tag_version="${GITHUB_REF_NAME#extension-v}"
          manifest_version=$(node -p "require('./apps/extension/manifest.json').version")
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match manifest.json version $manifest_version" >&2
            exit 1
          fi

      - name: Package extension
        run: npm run extension:package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            apps/extension/dist/broadsheet-extension-*.zip \
            --title "Extension ${GITHUB_REF_NAME#extension-v}" \
            --generate-notes
