# Broadsheet iOS — XcodeGen spec.
#
# Generate the Xcode project with:
#   brew install xcodegen
#   cd apps/ios && xcodegen generate
#   open Broadsheet.xcodeproj
#
# See README.md for signing and deployment instructions.

name: Broadsheet
options:
  bundleIdPrefix: com.broadsheet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    # Set DEVELOPMENT_TEAM via a local override (see README) — do not commit.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: "1.0.0"

targets:
  Broadsheet:
    type: application
    platform: iOS
    sources:
      - path: Broadsheet
      - path: Shared
    info:
      path: Broadsheet/Info.plist
      properties:
        CFBundleDisplayName: Broadsheet
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Broadsheet/Broadsheet.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.broadsheet.ios
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.broadsheet.ios.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.broadsheet.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Save to Broadsheet
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.broadsheet.ios
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.broadsheet.ios.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.broadsheet.ios.share
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: "YES"
