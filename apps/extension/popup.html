<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Broadsheet</title>
    <style>
      :root {
        --bg: #fafaf7;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --accent: #b4451f;
        --rule: #e4e2dc;
      }
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      h1 {
        font-family: "Iowan Old Style", Palatino, Georgia, serif;
        font-size: 18px;
        margin: 0 0 12px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        min-height: 16px;
      }
      .status.error {
        color: #a11;
      }
      .status.success {
        color: var(--accent);
      }
      .footer {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid var(--rule);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
      }
      .footer a {
        color: var(--muted);
        text-decoration: none;
      }
      .footer a:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <h1>Broadsheet</h1>
    <button id="save">Save this tab</button>
    <div class="status" id="status"></div>
    <div class="footer">
      <a href="#" id="open-options">Settings</a>
      <span id="host"></span>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
