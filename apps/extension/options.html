<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Broadsheet — Settings</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        width: 360px;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          Helvetica, Arial, sans-serif;
        background: #fafaf7;
        color: #1a1a1a;
      }
      h1 {
        font-family: "Iowan Old Style", Palatino, Georgia, serif;
        font-size: 20px;
        margin: 0 0 18px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #6b6b6b;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e4e2dc;
        border-radius: 4px;
        font-size: 14px;
        background: white;
        box-sizing: border-box;
      }
      button {
        margin-top: 14px;
        padding: 8px 14px;
        border: 1px solid #b4451f;
        background: #b4451f;
        color: white;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      .hint {
        font-size: 11px;
        color: #6b6b6b;
        margin-top: 6px;
      }
      .saved {
        margin-top: 10px;
        font-size: 12px;
        color: #b4451f;
      }
    </style>
  </head>
  <body>
    <h1>Broadsheet settings</h1>
    <label for="base-url">Broadsheet base URL</label>
    <input id="base-url" type="url" placeholder="http://localhost:3000" />
    <p class="hint">
      Point at your Broadsheet install. Sign in there first — the extension uses
      your browser session.
    </p>
    <button id="save">Save</button>
    <div class="saved" id="saved"></div>
    <script src="options.js" type="module"></script>
  </body>
</html>
